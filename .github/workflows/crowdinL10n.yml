name: Crowdin l10n

on:

  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run mode (skip Crowdin upload/download)'
        required: false
        type: boolean
        default: false
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  crowdinAuthToken: ${{ secrets.CROWDIN_TOKEN }}
  downloadTranslationsBranch: l10n
jobs:
  build:
    uses: ./.github/workflows/build_addon.yml
  crowdinSync:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout add-on
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
      - name: Get add-on info
        id: getAddonInfo
        shell: pwsh
        run: |
          uv sync
          uv run ./.github/workflows/setOutputs.py
      - name: Download l10nUtil from nvdal10n
        if: ${{ inputs.dry-run != true }}
        run: |
          gh run download --repo nvaccess/nvdal10n --name l10nUtil --dir _l10n
      - name: Upload md
        if: ${{ (steps.getAddonInfo.outputs.shouldAddMdFromScratch == 'true' || steps.getAddonInfo.outputs.shouldUpdateMd == 'true') && inputs.dry-run != true }}
        run: |
          Move-Item -Path readme.md -Destination "${{ steps.getAddonInfo.outputs.addonId }}.md"
          uv run ./_l10n/l10nUtil.exe uploadSourceFile --localFilePath=${{ steps.getAddonInfo.outputs.addonId }}.md -c addon
      - name: Download pot from build job
        if: ${{ inputs.dry-run != true }}
        uses: actions/download-artifact@v8
        with:
          name: packaged_addon
      - name: Upload pot
        if: ${{ (steps.getAddonInfo.outputs.shouldAddPotFromScratch == 'true' || steps.getAddonInfo.outputs.shouldUpdatePot == 'true') && inputs.dry-run != true }}
        run: |
          uv run ./_l10n/l10nUtil.exe uploadSourceFile --localFilePath=${{ steps.getAddonInfo.outputs.addonId }}.pot -c addon
      - name: Download translations from Crowdin
        if: ${{ inputs.dry-run != true }}
        run: |
          uv run _l10n/l10nUtil.exe exportTranslations -o _addonL10n -c addon
          New-Item -ItemType Directory -Force -Path addon/locale | Out-Null
          New-Item -ItemType Directory -Force -Path addon/doc | Out-Null
          foreach ($dir in Get-ChildItem -Path "_addonL10n/${{ steps.getAddonInfo.outputs.addonId }}" -Directory) {
            Write-Host "Processing: $($dir.FullName)"
            $langCode = $dir.Name
            $poFile = Join-Path $dir.FullName "${{ steps.getAddonInfo.outputs.addonId }}.po"
            if (Test-Path -PathType Leaf $poFile) {
              $targetDir = "addon/locale/$langCode/LC_MESSAGES"
              New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
              Write-Host "Moving $poFile to $targetDir/nvda.po"
              Move-Item -Path $poFile -Destination "$targetDir/nvda.po" -Force
            }
            $mdFile = Join-Path $dir.FullName "${{ steps.getAddonInfo.outputs.addonId }}.md"
            if (Test-Path -PathType Leaf $mdFile) {
              $targetDir = "addon/doc/$langCode"
              New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
              Write-Host "Moving $mdFile to $targetDir/readme.md"
              Move-Item -Path $mdFile -Destination "$targetDir/readme.md" -Force
            }
          }
          git add addon/locale addon/doc
          $diff = git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Nothing added to commit."
          } else {
            git commit -m "Update translations for ${{ steps.getAddonInfo.outputs.addonId }}"
            git checkout -b ${{ env.downloadTranslationsBranch }}
            git push -f --set-upstream origin ${{ env.downloadTranslationsBranch }}
          }
